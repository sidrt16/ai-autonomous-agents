<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Meeting Proxy Agent</title>
<script src="https://appssdk.zoom.us/sdk.js"></script>
<style>
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;font-size:13px;line-height:1.4;background:#fff;color:#1a1a18;height:100vh;display:flex;flex-direction:column}
  .header{padding:12px 16px;border-bottom:1px solid #e8e8e4;display:flex;align-items:center;justify-content:space-between;background:#fff;z-index:10;flex-shrink:0}
  .header-title{font-size:13px;font-weight:600}
  .badge{font-size:11px;padding:3px 8px;border-radius:10px;font-weight:500;background:#f0f7ff;color:#1d4ed8}
  .badge.connected{background:#f0fdf4;color:#166534}
  .tabs{display:flex;border-bottom:1px solid #e8e8e4;flex-shrink:0;background:#fafafa;overflow-x:auto}
  .tab{flex-shrink:0;padding:10px 12px;font-size:12px;font-weight:500;cursor:pointer;color:#666;border-bottom:2px solid transparent;background:none;border:none}
  .tab.active{color:#1a1a18;border-bottom-color:#3b5bdb;font-weight:600}
  .screen{display:none;flex:1;overflow-y:auto;flex-direction:column;padding:14px}
  .screen.active{display:flex}
  .card{background:#f8f8f6;border-radius:8px;padding:12px;border:1px solid #e8e8e4;margin-bottom:12px}
  .label{font-size:10px;font-weight:600;color:#777;text-transform:uppercase;letter-spacing:.03em;margin-bottom:4px;display:block}
  input,textarea,select{width:100%;padding:8px;border:1px solid #dcdbd3;border-radius:6px;font-size:13px;font-family:inherit;background:#fff;margin-bottom:8px}
  input:focus,textarea:focus,select:focus{outline:none;border-color:#3b5bdb}
  .btn{width:100%;padding:10px;border-radius:8px;font-size:13px;font-weight:500;cursor:pointer;border:none;transition:background 0.2s;margin-bottom:8px}
  .btn-primary{background:#3b5bdb;color:#fff}
  .btn-primary:hover{background:#2b49b3}
  .btn-primary:disabled{background:#a8b8e8;cursor:not-allowed}
  .btn-secondary{background:#e8e8e4;color:#1a1a18}
  .btn-secondary:hover{background:#d8d8d0}
  .btn-small{width:auto;padding:6px 12px;font-size:12px;margin:0;margin-right:8px}
  .error{background:#fdf2f2;border:1px solid #f8b4b4;color:#9b1c1c;padding:10px;border-radius:6px;font-size:12px;margin-bottom:10px;display:none}
  .success{background:#f0fdf4;border:1px solid #22c55e;color:#166534;padding:10px;border-radius:6px;font-size:12px;margin-bottom:10px;display:none}
  .live-banner{background:#fff7ed;border:1px solid #fb923c;color:#9a3412;padding:10px;border-radius:6px;font-size:12px;margin-bottom:10px;display:none}
  .meeting-item{background:#fff;border:1px solid #e8e8e4;border-radius:6px;padding:10px;margin-bottom:8px;cursor:pointer;display:flex;justify-content:space-between;align-items:center;gap:8px}
  .meeting-item:hover{background:#f8f8f6}
  .meeting-item.selected{border-color:#3b5bdb;background:#f0f7ff}
  .meeting-main{flex:1;cursor:pointer}
  .meeting-time{font-size:11px;color:#666}
  .meeting-context-pill{font-size:10px;color:#166534;background:#f0fdf4;padding:2px 6px;border-radius:8px;display:inline-block;margin-top:4px}
  .transcript-log{background:#fafafa;border:1px solid #e8e8e4;border-radius:6px;height:200px;overflow-y:auto;padding:8px;margin-bottom:8px;font-family:monospace;font-size:11px}
  .transcript-turn{margin-bottom:6px;padding:4px;border-left:2px solid #3b5bdb}
  .transcript-turn.agent{border-left-color:#22c55e}
  .agent-response{color:#166534;font-weight:500}
  .divider{border-top:1px solid #e8e8e4;margin:12px 0}
  .icon-btn{background:none;border:none;cursor:pointer;font-size:14px;padding:4px 8px;color:#666}
  .icon-btn:hover{color:#1a1a18}
</style>
</head>
<body>

<div class="header">
  <div style="flex:1">
    <div class="header-title">Meeting Proxy Agent</div>
    <div style="font-size:11px;color:#666;margin-top:2px">Multi-meeting context + live execution</div>
  </div>
  <div class="badge" id="status-badge">Setup</div>
</div>

<div class="tabs">
  <button class="tab active" id="tab-setup" onclick="switchTab('setup')">1. Setup</button>
  <button class="tab" id="tab-prep" onclick="switchTab('prep')">2. Context</button>
  <button class="tab" id="tab-exec" onclick="switchTab('exec')">3. Live</button>
  <button class="tab" id="tab-results" onclick="switchTab('results')">4. Results</button>
</div>

<!-- ===== PHASE 1: SETUP ===== -->
<div class="screen active" id="screen-setup">
  <div id="error-setup" class="error"></div>
  <div id="success-setup" class="success"></div>

  <div class="card">
    <span class="label">Zoom Authentication</span>
    <div id="zoom-status" style="font-size:12px;padding:8px;background:#f0f7ff;border-radius:4px;border-left:3px solid #3b5bdb;">
      Initializing...
    </div>
    <a id="btn-zoom-signin" class="btn btn-primary" href="/auth/zoom/login" target="_blank" rel="noopener noreferrer"
       style="display:none;margin-top:8px;text-decoration:none;text-align:center;box-sizing:border-box"
       onclick="onZoomSigninClicked()">Sign in with Zoom</a>
    <button class="btn btn-secondary" id="btn-zoom-refresh" onclick="loadMe()" style="display:none;margin-top:8px">I've signed in — refresh</button>
  </div>

  <div class="card">
    <span class="label">Calendar Integration</span>
    <div style="display:flex;gap:8px;margin-bottom:8px">
      <button class="btn btn-secondary btn-small" id="btn-google" onclick="connectGoogle()">Connect Google</button>
      <button class="btn btn-secondary btn-small" id="btn-outlook" onclick="connectOutlook()">Connect Outlook</button>
    </div>
    <div id="calendar-status" style="font-size:11px;color:#666">Calendars: checking…</div>
  </div>

  <div class="card">
    <span class="label">Your Profile</span>
    <input type="text" id="profile-name" placeholder="Full name">
    <input type="text" id="profile-title" placeholder="Job title">
    <input type="text" id="profile-company" placeholder="Company">
    <select id="profile-style">
      <option value="professional">Professional &amp; formal</option>
      <option value="direct">Direct &amp; to the point</option>
      <option value="collaborative">Collaborative &amp; warm</option>
    </select>
    <button class="btn btn-primary" onclick="saveProfile()">Save Profile</button>
  </div>

  <button class="btn btn-primary" style="margin-top:16px" onclick="switchTab('prep')">Next: Set Meeting Contexts →</button>
</div>

<!-- ===== PHASE 2: CONTEXT PREP ===== -->
<div class="screen" id="screen-prep">
  <div id="error-prep" class="error"></div>
  <div id="success-prep" class="success"></div>

  <div class="card">
    <span class="label">Upcoming Meetings</span>
    <button class="btn btn-secondary" onclick="loadUpcomingMeetings()">📅 Refresh Meetings (Next 48 Hours)</button>
  </div>

  <div id="meetings-list" style="flex:1;overflow-y:auto">
    <div style="color:#666;font-size:12px;padding:20px;text-align:center">Loading meetings…</div>
  </div>
</div>

<!-- Meeting Context Editor Modal -->
<div id="context-modal" style="display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.5);z-index:1000;padding:20px;overflow-y:auto">
  <div style="background:#fff;border-radius:8px;padding:20px;max-width:500px;margin:0 auto;margin-top:40px">
    <h3 id="modal-title" style="font-size:14px;font-weight:600;margin-bottom:12px">Set Context</h3>

    <label class="label">Goals for this meeting</label>
    <textarea id="modal-goals" placeholder="What do you want to achieve?" rows="2"></textarea>

    <label class="label">What to avoid</label>
    <textarea id="modal-avoid" placeholder="Don't commit to..." rows="2"></textarea>

    <div style="display:flex;gap:8px;margin-bottom:8px">
      <div style="flex:1">
        <label class="label">Financial cap</label>
        <input type="text" id="modal-financial" value="$0 — flag all">
      </div>
      <div style="flex:1">
        <label class="label">Timeline cap</label>
        <input type="text" id="modal-timeline" value="1 week">
      </div>
    </div>

    <label class="label">Off-limits topics</label>
    <textarea id="modal-offlimits" placeholder="Internal data, unreleased features..." rows="2"></textarea>

    <div style="display:flex;gap:8px">
      <button class="btn btn-primary" onclick="saveContextAndClose()">Save Context</button>
      <button class="btn btn-secondary" onclick="closeContextModal()">Cancel</button>
    </div>
  </div>
</div>

<!-- ===== PHASE 3: LIVE EXECUTION ===== -->
<div class="screen" id="screen-exec">
  <div id="error-exec" class="error"></div>
  <div id="success-exec" class="success"></div>
  <div id="live-banner" class="live-banner"></div>

  <div class="card">
    <span class="label">Select Meeting to Run</span>
    <select id="exec-meeting-select" onchange="onSelectExecMeeting()">
      <option value="">— Choose a meeting —</option>
    </select>
    <div id="exec-meeting-context" style="font-size:11px;color:#666;margin-top:4px"></div>
  </div>

  <div class="card">
    <span class="label">Live Transcript</span>
    <div class="transcript-log" id="transcript-display"></div>
    <div style="display:flex;gap:6px">
      <input type="text" id="speaker-name" value="You" style="width:80px;margin-bottom:0">
      <input type="text" id="transcript-input" placeholder="What was said?" style="flex:1;margin-bottom:0" disabled>
    </div>
    <button class="btn btn-primary" id="btn-inject" onclick="injectTranscript()" disabled>Add Turn</button>
  </div>

  <div style="display:flex;gap:8px">
    <button class="btn btn-primary" id="btn-start-meeting" onclick="startMeeting()" disabled>Start Agent</button>
    <button class="btn btn-secondary" id="btn-end-meeting" onclick="endMeeting()" style="display:none">End &amp; Extract</button>
  </div>
</div>

<!-- ===== PHASE 4: RESULTS ===== -->
<div class="screen" id="screen-results">
  <div id="error-results" class="error"></div>
  <div id="success-results" class="success"></div>
  <div class="card">
    <span class="label">Meeting Deliverables</span>
    <textarea id="deliverables-box" style="height:300px;font-family:monospace;font-size:11px" readonly placeholder="Deliverables will appear here..."></textarea>
  </div>
</div>

<script>
const API = '/api';
let currentUser = null;
let allMeetings = [];           // last fetched calendar meetings, cached in memory
let savedContexts = {};         // meeting_id -> context, cached client-side once loaded/saved
let contextEditorMeeting = null;
let currentMeeting = null;      // meeting_id selected for Live Execution
let zoomMeetingContext = null;  // populated by zoomSdk.getMeetingContext() if available

async function api(path, opts = {}) {
  const controller = new AbortController();
  const timeoutId = setTimeout(() => controller.abort(), 25000); // generous — Render free tier can cold-start slowly
  let r;
  try {
    r = await fetch(API + path, { credentials: 'include', signal: controller.signal, ...opts });
  } catch (err) {
    if (err.name === 'AbortError') {
      const timeoutErr = new Error(`Request to ${path} timed out after 25s — server may be cold-starting (try again) or unreachable`);
      timeoutErr.status = 0;
      throw timeoutErr;
    }
    const networkErr = new Error(`Network error calling ${path}: ${err.message}`);
    networkErr.status = 0;
    throw networkErr;
  } finally {
    clearTimeout(timeoutId);
  }
  if (!r.ok) {
    const e = await r.json().catch(() => ({ detail: r.statusText }));
    const err = new Error(e.detail || r.statusText);
    err.status = r.status;
    throw err;
  }
  return r.json();
}

function showError(msg, section = 'setup') {
  const el = document.getElementById(`error-${section}`);
  if (el) {
    el.textContent = msg;
    el.style.display = 'block';
    setTimeout(() => el.style.display = 'none', 5000);
  }
}

function showSuccess(msg, section = 'setup') {
  const el = document.getElementById(`success-${section}`);
  if (el) {
    el.textContent = msg;
    el.style.display = 'block';
    setTimeout(() => el.style.display = 'none', 3000);
  }
}

function switchTab(tab) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(`tab-${tab}`).classList.add('active');
  document.getElementById(`screen-${tab}`).classList.add('active');

  const badges = { setup: 'Setup', prep: 'Context Prep', exec: 'Live', results: 'Results' };
  document.getElementById('status-badge').textContent = badges[tab] || 'Setup';

  if (tab === 'exec') populateExecMeetingSelect();
}

// ---------------------------------------------------------------------------
// Zoom SDK — detect whether we're actually inside a live Zoom meeting right
// now. If so, surface a banner offering to auto-start the agent for it
// (covers the "agent should start itself for an impromptu/unscheduled call"
// requirement, without needing a calendar entry at all).
// ---------------------------------------------------------------------------
async function detectActiveZoomMeeting() {
  // IMPORTANT: only request 'getMeetingContext' here — this is the exact
  // capability set that has been verified to work. Requesting additional,
  // unapproved capabilities (e.g. getRunningContext) can cause the Zoom
  // client itself to reject the app's SDK handshake when running inside a
  // live meeting, which surfaces as Zoom's own native "Something went
  // wrong" panel — a failure that happens at the host level, before any
  // try/catch in this page can do anything about it. Keep this minimal.
  try {
    if (typeof zoomSdk === 'undefined') return;
    await zoomSdk.config({ capabilities: ['getMeetingContext'] });
  } catch (err) {
    console.warn('Zoom SDK config() unavailable or capability not approved for this app:', err);
    return;
  }

  try {
    const ctx = await zoomSdk.getMeetingContext();
    if (ctx && ctx.meetingID) {
      zoomMeetingContext = {
        meeting_id: `zoom-live-${ctx.meetingID}`,
        title: ctx.meetingTopic || 'Current Zoom Meeting',
        source: 'zoom-live',
        start: new Date().toISOString(),
        attendees: [],
      };
      const banner = document.getElementById('live-banner');
      banner.innerHTML = `🔴 You're in a live meeting: <strong>${zoomMeetingContext.title}</strong> — `
        + `<a href="#" onclick="useZoomLiveMeeting();return false;" style="color:#9a3412;font-weight:600;">start the agent for it →</a>`;
      banner.style.display = 'block';
    }
  } catch (err) {
    // Not every Zoom client/version/surface supports this — fail silently,
    // this is a convenience enhancement, not a requirement for the app to work.
    console.warn('zoomSdk.getMeetingContext() unavailable:', err);
  }
}

function useZoomLiveMeeting() {
  if (!zoomMeetingContext) return;
  if (!allMeetings.find(m => m.meeting_id === zoomMeetingContext.meeting_id)) {
    allMeetings.unshift(zoomMeetingContext);
  }
  switchTab('exec');
  document.getElementById('exec-meeting-select').value = zoomMeetingContext.meeting_id;
  onSelectExecMeeting();
}

// ---------------------------------------------------------------------------
// Phase 1: Setup
// ---------------------------------------------------------------------------
function setZoomStatus(msg, kind = 'info') {
  const el = document.getElementById('zoom-status');
  el.textContent = msg;
  const colors = {
    info: ['#3b5bdb', '#f0f7ff'],
    error: ['#e03131', '#fdf2f2'],
    success: ['#22c55e', '#f0fdf4'],
  };
  const [border, bg] = colors[kind] || colors.info;
  el.style.borderLeftColor = border;
  el.style.background = bg;
}

function onZoomSigninClicked() {
  // The actual navigation is handled natively by the <a href target="_blank">
  // element itself — NOT by this function. This matters: a real anchor click
  // is treated differently by Zoom's embedded webview sandbox than a
  // JavaScript-triggered window.open() call, which was observed to silently
  // do nothing when tested inside the real Zoom client. This handler only
  // updates the on-screen status; it does not call preventDefault(), so the
  // native navigation proceeds in parallel.
  document.getElementById('btn-zoom-refresh').style.display = 'block';
  setZoomStatus('Complete sign-in in the new window, then click refresh below', 'info');
  setTimeout(loadMe, 3000); // also try automatically, in case it completes quickly
}

async function loadMe() {
  setZoomStatus('Checking session…', 'info');
  try {
    currentUser = await api('/me');
    updateZoomStatus();
    updateCalendarStatus();
    const p = currentUser.profile || {};
    if (p.name) document.getElementById('profile-name').value = p.name;
    if (p.title) document.getElementById('profile-title').value = p.title;
    if (p.company) document.getElementById('profile-company').value = p.company;
    if (p.communication_style) document.getElementById('profile-style').value = p.communication_style;
  } catch (e) {
    if (e.status === 401) {
      // IMPORTANT: do NOT auto-redirect via window.location.href here. Zoom's
      // embedded app panel blocks top-level self-navigation outright — even
      // a direct click-triggered window.location.href assignment is silently
      // dropped. window.open() (a new window/tab) is the mechanism Zoom's
      // sandbox actually permits, matching the same pattern already proven
      // to work for the Google/Outlook connect buttons below.
      setZoomStatus('Not signed in yet', 'info');
      document.getElementById('btn-zoom-signin').style.display = 'block';
    } else if (e.status === 0) {
      setZoomStatus('⚠ ' + e.message, 'error');
      showError(e.message, 'setup');
    } else {
      setZoomStatus('⚠ Failed to load session (see error below)', 'error');
      showError('Failed to load user: ' + e.message, 'setup');
    }
  }
}

function updateZoomStatus() {
  if (currentUser) {
    setZoomStatus(`✓ Authenticated as ${currentUser.profile?.name || 'User'}`, 'success');
    document.getElementById('btn-zoom-signin').style.display = 'none';
    document.getElementById('btn-zoom-refresh').style.display = 'none';
  }
}

function updateCalendarStatus() {
  const google = currentUser.google_connected;
  const outlook = currentUser.outlook_connected;
  const status = `${google ? '✓ Google' : 'Google'} · ${outlook ? '✓ Outlook' : 'Outlook'}`;
  document.getElementById('calendar-status').textContent = `Calendars: ${status}`;
  document.getElementById('btn-google').textContent = google ? '✓ Google Connected' : 'Connect Google';
  document.getElementById('btn-outlook').textContent = outlook ? '✓ Outlook Connected' : 'Connect Outlook';
}

async function connectGoogle() {
  try {
    const tok = await api('/connect-token');
    const url = `/auth/google/login?write=true&connect_token=${encodeURIComponent(tok.connect_token)}`;
    window.open(url, '_blank');
    setTimeout(loadMe, 2500);
  } catch (e) {
    showError('Could not start Google connection: ' + e.message, 'setup');
  }
}

async function connectOutlook() {
  try {
    const tok = await api('/connect-token');
    const url = `/auth/outlook/login?connect_token=${encodeURIComponent(tok.connect_token)}`;
    window.open(url, '_blank');
    setTimeout(loadMe, 2500);
  } catch (e) {
    showError('Could not start Outlook connection: ' + e.message, 'setup');
  }
}

async function saveProfile() {
  try {
    await api('/profile', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        name: document.getElementById('profile-name').value,
        title: document.getElementById('profile-title').value,
        company: document.getElementById('profile-company').value,
        communication_style: document.getElementById('profile-style').value,
      }),
    });
    showSuccess('Profile saved', 'setup');
    loadMe();
  } catch (e) {
    showError('Failed to save: ' + e.message, 'setup');
  }
}

// ---------------------------------------------------------------------------
// Phase 2: Context Prep
// ---------------------------------------------------------------------------
async function loadUpcomingMeetings() {
  try {
    const data = await api('/meetings/upcoming?hours=48');
    allMeetings = data.meetings || [];
    renderMeetingsList();
    if (data.errors && Object.keys(data.errors).length) {
      const msgs = Object.entries(data.errors).map(([k, v]) => `${k}: ${v}`).join(' · ');
      showError(`Some calendars had issues — ${msgs}`, 'prep');
    }
  } catch (e) {
    showError('Failed to load meetings: ' + e.message, 'prep');
  }
}

function renderMeetingsList() {
  const list = document.getElementById('meetings-list');
  if (!allMeetings.length) {
    list.innerHTML = '<div style="padding:20px;text-align:center;color:#666">No upcoming meetings — connect a calendar or add one below.</div>';
    return;
  }
  list.innerHTML = allMeetings.map(m => {
    const id = m.meeting_id || m.event_id;
    const hasContext = !!savedContexts[id];
    return `
      <div class="meeting-item">
        <div class="meeting-main" onclick="editContext('${id}')">
          <div style="font-weight:500">${m.title}</div>
          <div class="meeting-time">${m.start ? new Date(m.start).toLocaleString() : 'No time set'}</div>
          ${hasContext ? '<span class="meeting-context-pill">Context set ✓</span>' : ''}
        </div>
        <button class="icon-btn" title="Set context" onclick="editContext('${id}')">✏️</button>
        <button class="icon-btn" title="Run live now" onclick="sendToLive('${id}')">▶</button>
      </div>
    `;
  }).join('');
}

function findMeeting(id) {
  return allMeetings.find(m => (m.meeting_id || m.event_id) === id);
}

async function editContext(meetingId) {
  contextEditorMeeting = meetingId;
  const meeting = findMeeting(meetingId);
  document.getElementById('modal-title').textContent = `Set context: ${meeting ? meeting.title : meetingId}`;

  // Load any previously saved context so reopening doesn't blank the form
  let existing = savedContexts[meetingId];
  if (!existing) {
    try {
      existing = await api(`/meetings/${encodeURIComponent(meetingId)}/context`);
      if (existing && existing.goals !== undefined) savedContexts[meetingId] = existing;
    } catch (e) {
      existing = null;
    }
  }

  document.getElementById('modal-goals').value = (existing && existing.goals) || '';
  document.getElementById('modal-avoid').value = (existing && existing.avoid) || '';
  document.getElementById('modal-financial').value = (existing && existing.financial_cap) || '$0 — flag all';
  document.getElementById('modal-timeline').value = (existing && existing.timeline_cap) || '1 week';
  document.getElementById('modal-offlimits').value = (existing && existing.off_limits) || '';

  document.getElementById('context-modal').style.display = 'block';
}

function closeContextModal() {
  document.getElementById('context-modal').style.display = 'none';
}

async function saveContextAndClose() {
  const meeting = findMeeting(contextEditorMeeting) || {};
  const payload = {
    meeting_id: contextEditorMeeting,
    title: meeting.title || 'Meeting',
    source: meeting.source || null,
    start: meeting.start || null,
    attendees: (meeting.attendees || []).map(a => ({
      name: a.name || null,
      email: a.email || null,
      response_status: a.response_status || null,
    })),
    goals: document.getElementById('modal-goals').value,
    avoid: document.getElementById('modal-avoid').value,
    financial_cap: document.getElementById('modal-financial').value,
    timeline_cap: document.getElementById('modal-timeline').value,
    off_limits: document.getElementById('modal-offlimits').value,
  };
  try {
    await api(`/meetings/${encodeURIComponent(contextEditorMeeting)}/context`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(payload),
    });
    savedContexts[contextEditorMeeting] = payload;
    showSuccess('Context saved', 'prep');
    closeContextModal();
    renderMeetingsList();
  } catch (e) {
    showError('Failed to save context: ' + e.message, 'prep');
  }
}

function sendToLive(meetingId) {
  switchTab('exec');
  populateExecMeetingSelect();
  document.getElementById('exec-meeting-select').value = meetingId;
  onSelectExecMeeting();
}

// ---------------------------------------------------------------------------
// Phase 3: Live Execution
// ---------------------------------------------------------------------------
function populateExecMeetingSelect() {
  const sel = document.getElementById('exec-meeting-select');
  const prevValue = sel.value;
  sel.innerHTML = '<option value="">— Choose a meeting —</option>' + allMeetings.map(m => {
    const id = m.meeting_id || m.event_id;
    return `<option value="${id}">${m.title}${m.start ? ' — ' + new Date(m.start).toLocaleString() : ''}</option>`;
  }).join('');
  if (prevValue && findMeeting(prevValue)) sel.value = prevValue;
}

function onSelectExecMeeting() {
  const id = document.getElementById('exec-meeting-select').value;
  currentMeeting = id || null;
  const meeting = id ? findMeeting(id) : null;
  const ctx = id ? savedContexts[id] : null;

  const ctxDiv = document.getElementById('exec-meeting-context');
  if (meeting) {
    const goalsLine = ctx && ctx.goals ? `Goals: ${ctx.goals}` : 'No context set yet — agent will run with defaults.';
    ctxDiv.textContent = goalsLine;
  } else {
    ctxDiv.textContent = '';
  }

  document.getElementById('btn-start-meeting').disabled = !currentMeeting;
}

async function startMeeting() {
  if (!currentMeeting) {
    showError('Please select a meeting first', 'exec');
    return;
  }
  try {
    const res = await api(`/proxy/start?meeting_id=${encodeURIComponent(currentMeeting)}`, { method: 'POST' });
    document.getElementById('btn-start-meeting').style.display = 'none';
    document.getElementById('btn-end-meeting').style.display = 'block';
    document.getElementById('transcript-input').disabled = false;
    document.getElementById('btn-inject').disabled = false;
    document.getElementById('exec-meeting-select').disabled = true;
    document.getElementById('transcript-display').innerHTML = `[Agent initialized for "${res.title || currentMeeting}"]\n`;
    showSuccess('Agent started', 'exec');
  } catch (e) {
    showError('Failed to start: ' + e.message, 'exec');
  }
}

async function injectTranscript() {
  if (!currentMeeting) return;
  const speaker = document.getElementById('speaker-name').value || 'Speaker';
  const text = document.getElementById('transcript-input').value;
  if (!text) return;

  try {
    const data = await api(`/proxy/transcript/${encodeURIComponent(currentMeeting)}`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ speaker, text }),
    });

    const log = document.getElementById('transcript-display');
    log.innerHTML += `<div class="transcript-turn">[${speaker}]: ${text}</div>`;
    if (data.reply) {
      log.innerHTML += `<div class="transcript-turn agent"><span class="agent-response">→ Agent: ${data.reply}</span></div>`;
    }
    log.scrollTop = log.scrollHeight;
    document.getElementById('transcript-input').value = '';
  } catch (e) {
    showError('Failed to inject: ' + e.message, 'exec');
  }
}

async function endMeeting() {
  if (!currentMeeting) return;
  try {
    const data = await api(`/proxy/end/${encodeURIComponent(currentMeeting)}`, { method: 'POST' });
    document.getElementById('deliverables-box').value = data.deliverables || JSON.stringify(data, null, 2);
    document.getElementById('btn-start-meeting').style.display = 'block';
    document.getElementById('btn-start-meeting').disabled = false;
    document.getElementById('btn-end-meeting').style.display = 'none';
    document.getElementById('transcript-input').disabled = true;
    document.getElementById('btn-inject').disabled = true;
    document.getElementById('exec-meeting-select').disabled = false;
    currentMeeting = null;
    switchTab('results');
    showSuccess('Meeting concluded', 'results');
  } catch (e) {
    showError('Failed to end: ' + e.message, 'exec');
  }
}

document.getElementById('transcript-input').addEventListener('keypress', (e) => {
  if (e.key === 'Enter') injectTranscript();
});

// ---------------------------------------------------------------------------
// Initialize
// ---------------------------------------------------------------------------
window.addEventListener('load', async () => {
  await loadMe();
  await loadUpcomingMeetings();
  populateExecMeetingSelect();
  detectActiveZoomMeeting();
});

// Explicitly export every function referenced by an inline onclick/onchange
// HTML attribute. Function declarations are global by default, but this
// removes any ambiguity (e.g. if Zoom's embedded webview ever wraps or
// re-executes this script in a way that affects scoping) — inline handlers
// always resolve through window, so this guarantees they're reachable.
window.switchTab = switchTab;
window.onZoomSigninClicked = onZoomSigninClicked;
window.loadMe = loadMe;
window.connectGoogle = connectGoogle;
window.connectOutlook = connectOutlook;
window.saveProfile = saveProfile;
window.loadUpcomingMeetings = loadUpcomingMeetings;
window.editContext = editContext;
window.closeContextModal = closeContextModal;
window.saveContextAndClose = saveContextAndClose;
window.sendToLive = sendToLive;
window.onSelectExecMeeting = onSelectExecMeeting;
window.startMeeting = startMeeting;
window.injectTranscript = injectTranscript;
window.endMeeting = endMeeting;
window.useZoomLiveMeeting = useZoomLiveMeeting;
</script>
</body>
