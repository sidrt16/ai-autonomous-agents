<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Meeting Proxy Context Engine</title>
<script src="https://appssdk.zoom.us/sdk.js"></script>
<style>
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;font-size:13px;line-height:1.4;background:#fff;color:#1a1a18;height:100vh;display:flex;flex-direction:column}
  .header{padding:10px 14px;border-bottom:1px solid #e8e8e4;display:flex;align-items:center;justify-content:space-between;background:#fff;z-index:10;flex-shrink:0}
  .header-title{font-size:13px;font-weight:600;display:flex;align-items:center;gap:6px}
  .dot{width:8px;height:8px;border-radius:50%;background:#22c55e;display:none}
  .dot.live{display:block;animation:pulse 1.5s infinite}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
  .badge{font-size:10px;padding:2px 7px;border-radius:10px;font-weight:500;background:#eff6ff;color:#1d4ed8}
  .badge.live{background:#f0fdf4;color:#166534}
  .tabs{display:flex;border-bottom:1px solid #e8e8e4;flex-shrink:0;background:#fafafa}
  .tab{flex:1;padding:10px 0;font-size:12px;font-weight:500;text-align:center;cursor:pointer;color:#666;border-bottom:2px solid transparent;background:none;border:none}
  .tab.active{color:#1a1a18;border-bottom-color:#3b5bdb;font-weight:600}
  .screen{display:none;flex:1;overflow-y:auto;flex-direction:column}
  .screen.active{display:flex}
  .body{padding:14px;display:flex;flex-direction:column;gap:12px;flex:1}
  .card{background:#f8f8f6;border-radius:8px;padding:12px;border:1px solid #e8e8e4}
  .label{font-size:10px;font-weight:600;color:#777;text-transform:uppercase;letter-spacing:.03em;margin-bottom:4px;display:block}
  input,textarea,select{width:100%;padding:8px;border:1px solid #dcdbd3;border-radius:6px;font-size:13px;font-family:inherit;background:#fff;margin-bottom:8px}
  input:focus,textarea:focus,select:focus{outline:none;border-color:#3b5bdb}
  .btn{width:100%;padding:10px;border-radius:8px;font-size:13px;font-weight:500;cursor:pointer;border:none;transition:background 0.2s}
  .btn-primary{background:#3b5bdb;color:#fff}
  .btn-primary:hover{background:#2b49b3}
  .btn-danger{background:#e03131;color:#fff}
  .btn-danger:hover{background:#b82020}
  .transcript-log{background:#fafafa;border:1px solid #e8e8e4;border-radius:6px;height:180px;overflow-y:auto;padding:8px;margin-bottom:8px;font-family:monospace;font-size:11px}
</style>
</head>
<body>

<div class="header">
  <div class="header-title">
    <div class="dot" id="live-dot"></div>
    <span>Meeting Proxy</span>
  </div>
  <div class="badge" id="app-status">CONFIGURATION</div>
</div>

<div class="tabs">
  <button class="tab active" id="tab-config" onclick="switchTab('config')">1. Context Prep</button>
  <button class="tab" id="tab-live" onclick="switchTab('live')">2. Live Execution</button>
  <button class="tab" id="tab-post" onclick="switchTab('post')">3. Deliverables</button>
</div>

<div class="screen active" id="screen-config">
  <div class="body">
    <div class="card" style="border-left: 4px solid #3b5bdb; background: #f0f7ff;">
      <span class="label" style="color: #1d4ed8;">Active Zoom Platform Insight</span>
      <div id="meeting-topic" style="font-weight:600; font-size:14px; color:#1e3a8a;">Detecting active runtime context...</div>
      <div id="meeting-id" style="font-size:11px; color:#6b7280; margin-top:2px;">ID: fallback_standalone</div>
    </div>

    <div class="card">
      <span class="label">Strategic Knowledge & Guardrails</span>
      
      <label class="label">Proxy Intent / Core Objectives</label>
      <textarea id="agent-goals" rows="3" placeholder="What core position must the agent protect or brief the team on?"></textarea>

      <label class="label">Items to Explicitly Defend / Avoid</label>
      <input type="text" id="agent-avoid" placeholder="Avoid alignment on price concessions, timeline drops...">

      <div style="display: flex; gap: 8px;">
        <div style="flex: 1;">
          <label class="label">Financial Cap</label>
          <input type="text" id="agent-caps" value="$0 cap — flag all modifications">
        </div>
        <div style="flex: 1;">
          <label class="label">Timeline Boundaries</label>
          <input type="text" id="agent-timeline" value="1 week max boundary">
        </div>
      </div>

      <label class="label">Off-Limits Domain Data</label>
      <input type="text" id="agent-off-limits" placeholder="Internal margin definitions, unreleased feature maps">
    </div>

    <button class="btn btn-primary" id="btn-promote" onclick="promoteProxyToActive()">Promote Agent to Active Proxy</button>
  </div>
</div>

<div class="screen" id="screen-live">
  <div class="body">
    <div class="card">
      <span class="label">Real-time Transcript Feed Injection</span>
      <div class="transcript-log" id="live-transcript-box">[System initialized. Awaiting manual configuration promotional link...]</div>
      
      <div style="display:flex; gap:6px;">
        <input type="text" id="mock-speaker" value="Team Member" style="width:110px; margin-bottom:0;">
        <input type="text" id="transcript-input" placeholder="Type sentence spoken by attendee..." style="flex:1; margin-bottom:0;">
      </div>
      <button class="btn btn-primary" onclick="injectMockTurn()" style="margin-top:8px;">Transmit Live Turn</button>
    </div>
    
    <button class="btn btn-danger" onclick="terminateMeeting()" style="margin-top:12px;">Conclude Session & Extract Logs</button>
  </div>
</div>

<div class="screen" id="screen-post">
  <div class="body">
    <div class="card" style="flex:1; display:flex; flex-direction:column;">
      <span class="label">Claude Consolidated Deliverables</span>
      <textarea id="deliverables-box" style="flex:1; min-height:360px;" readonly placeholder="Complete synthesis logs will stream here post extraction closure..."></textarea>
    </div>
  </div>
</div>

<script>
let activeMeetingId = "fallback_standalone";
let activeTitle = "Standalone Space / Impromptu Call";

function switchTab(tabId) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(`tab-${tabId}`).classList.add('active');
  document.getElementById(`screen-${tabId}`).classList.add('active');
}

async function checkNativeZoomEnvironment() {
  try {
    await zoomSdk.config({ capabilities: ['getMeetingContext'] });
    const context = await zoomSdk.getMeetingContext();
    if (context && context.meetingID) {
      activeMeetingId = context.meetingID;
      activeTitle = context.meetingTopic || "Active Platform Call";
    }
  } catch (err) {
    console.warn("Running inside sandbox webview context fallback.", err);
  }
  document.getElementById('meeting-topic').innerText = activeTitle;
  document.getElementById('meeting-id').innerText = `ID: ${activeMeetingId}`;
}

async function promoteProxyToActive() {
  const payload = {
    meeting_id: activeMeetingId,
    title: activeTitle,
    goals: document.getElementById('agent-goals').value,
    avoid: document.getElementById('agent-avoid').value,
    financial_cap: document.getElementById('agent-caps').value,
    timeline_cap: document.getElementById('agent-timeline').value,
    off_limits: document.getElementById('agent-off-limits').value
  };

  const res = await fetch('/api/proxy/active-promote', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(payload)
  });

  if (res.ok) {
    document.getElementById('app-status').className = "badge live";
    document.getElementById('app-status').innerText = "PROXY RUNNING";
    document.getElementById('live-dot').classList.add('live');
    document.getElementById('live-transcript-box').innerHTML = `=== Proxy Context Engaged for ID: ${activeMeetingId} ===\n`;
    switchTab('live');
  } else {
    alert("Context alignment rejection from endpoint setup.");
  }
}

async function injectMockTurn() {
  const speaker = document.getElementById('mock-speaker').value || "Unknown";
  const text = document.getElementById('transcript-input').value;
  if (!text.strip) return;

  const logBox = document.getElementById('live-transcript-box');
  logBox.innerHTML += `[${speaker}]: ${text}\n`;
  logBox.scrollTop = logBox.scrollHeight;

  document.getElementById('transcript-input').value = '';

  const res = await fetch(`/api/proxy/transcript/${encodeURIComponent(activeMeetingId)}`, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ speaker: speaker, text: text })
  });

  const data = await res.json();
  if (data.reply) {
    logBox.innerHTML += `👉 [PROXY AGENT]: ${data.reply}\n`;
    logBox.scrollTop = logBox.scrollHeight;
  }
}

async function terminateMeeting() {
  const res = await fetch(`/api/proxy/end/${encodeURIComponent(activeMeetingId)}`, { method: 'POST' });
  const data = await res.json();
  document.getElementById('deliverables-box').value = data.deliverables;
  
  document.getElementById('app-status').className = "badge";
  document.getElementById('app-status').innerText = "EXTRACTED";
  document.getElementById('live-dot').classList.remove('live');
  switchTab('post');
}

document.getElementById('transcript-input').addEventListener('keydown', e => {
  if (e.key === 'Enter') injectMockTurn();
});

window.addEventListener('DOMContentLoaded', checkNativeZoomEnvironment);
</script>
</body>
</html>
