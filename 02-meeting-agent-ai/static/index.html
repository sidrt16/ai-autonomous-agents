<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Meeting Proxy</title>
<script src="https://appssdk.zoom.us/sdk.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;font-size:14px;line-height:1.5;background:#fff;color:#1a1a18;height:100vh;display:flex;flex-direction:column}
.header{padding:10px 14px;border-bottom:1px solid #e8e8e4;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.header-title{font-size:14px;font-weight:600;display:flex;align-items:center;gap:7px}
.dot{width:8px;height:8px;border-radius:50%;background:#22c55e;display:none}
.dot.live{display:block;animation:pulse 1.5s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
.badge{font-size:10px;padding:2px 7px;border-radius:10px;font-weight:500}
.badge-setup{background:#eff6ff;color:#1d4ed8}
.badge-live{background:#f0fdf4;color:#166534}
.badge-done{background:#fefce8;color:#854d0e}
.tabs{display:flex;border-bottom:1px solid #e8e8e4;flex-shrink:0}
.tab{flex:1;padding:8px 0;font-size:12px;font-weight:500;text-align:center;cursor:pointer;color:#888;border-bottom:2px solid transparent;background:none;border-top:none;border-left:none;border-right:none}
.tab.active{color:#1a1a18;border-bottom-color:#3b5bdb}
.screen{display:none;flex:1;overflow-y:auto;flex-direction:column}
.screen.active{display:flex}
.body{padding:12px 14px;display:flex;flex-direction:column;gap:10px;flex:1}
.card{background:#f8f8f6;border-radius:8px;padding:10px 12px}
.label{font-size:11px;font-weight:600;color:#888;text-transform:uppercase;letter-spacing:.04em;margin-bottom:4px}
.meeting-item{padding:9px 11px;border-radius:8px;border:1px solid #e0dfd8;cursor:pointer;margin-bottom:6px;transition:border-color .15s}
.meeting-item:hover{border-color:#aaa}
.meeting-item.sel{border:1.5px solid #3b5bdb;background:#eff6ff}
.meeting-title{font-size:13px;font-weight:500;margin-bottom:2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.meeting-meta{font-size:11px;color:#888}
input,textarea,select{width:100%;padding:7px 9px;border:1px solid #ddd;border-radius:7px;font-size:13px;font-family:inherit;background:#fff}
.btn{width:100%;padding:9px;border-radius:8px;font-size:13px;font-weight:500;cursor:pointer;border:none}
.btn-primary{background:#3b5bdb;color:#fff}
.btn-primary:hover{background:#2f4cc0}
</style>
</head>
<body>

<div class="header">
  <div class="header-title">
    <div class="dot live" id="live-dot"></div>
    <span>Meeting Proxy</span>
  </div>
  <div class="badge badge-setup" id="status-badge">SETUP</div>
</div>

<div class="tabs">
  <button class="tab active" id="tab-selector" onclick="switchTab('selector')">Meetings</button>
  <button class="tab" id="tab-live" onclick="switchTab('live')">Live Proxy</button>
  <button class="tab" id="tab-post" onclick="switchTab('post')">Deliverables</button>
</div>

<div class="screen active" id="screen-selector">
  <div class="body">
    <div class="label">Native Sync Detection</div>
    <div id="matching-status" style="font-size:12px; color:#666; margin-bottom:10px;">
      Checking active Zoom client meeting context...
    </div>
    <div class="label">Available Calendar Schedule</div>
    <div id="meetings-list"></div>
    <button class="btn btn-primary" id="btn-start-setup" onclick="submitSetup()" style="margin-top:10px;">Initialize Proxy Configuration</button>
  </div>
</div>

<div class="screen" id="screen-live">
  <div class="body">
    <div class="card">
      <div class="label">Simulate Transcript Node</div>
      <input type="text" id="transcript-input" placeholder="Type speaker name and message..." style="margin-bottom:8px;">
      <button class="btn btn-primary" onclick="sendMockTranscript()">Inject Turn</button>
    </div>
    <button class="btn btn-primary" onclick="terminateMeeting()" style="background:#e03131; margin-top:20px;">Complete & End Meeting</button>
  </div>
</div>

<div class="screen" id="screen-post">
  <div class="body">
    <div class="label">Generated Output Deliverables</div>
    <textarea id="deliverables-box" style="height:350px;" readonly></textarea>
  </div>
</div>

<script>
let currentSelectedEvent = null;
let currentSource = 'google';

function switchTab(tabId) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(`tab-${tabId}`).classList.add('active');
  document.getElementById(`screen-${tabId}`).classList.add('active');
}

async function selectMeeting(eventId, source) {
  currentSelectedEvent = eventId;
  currentSource = source;
  document.getElementById('matching-status').innerText = `Matched running meeting in calendar list successfully (${source}).`;
  submitSetup();
}

async function submitSetup() {
  if (!currentSelectedEvent) return alert("Select or match a meeting first.");
  const res = await fetch('/api/meetings/setup', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ source: currentSource, event_id: currentSelectedEvent })
  });
  const data = await res.json();
  if (data.status === 'ready') {
    document.getElementById('status-badge').className = "badge badge-live";
    document.getElementById('status-badge').innerText = "LIVE";
    document.getElementById('live-dot').style.display = 'block';
    switchTab('live');
  }
}

async function sendMockTranscript() {
  const input = document.getElementById('transcript-input').value;
  await fetch('/api/meetings/transcript', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ speaker: "User", text: input })
  });
  document.getElementById('transcript-input').value = '';
}

async function terminateMeeting() {
  const res = await fetch('/api/meetings/end', { method: 'POST' });
  const data = await res.json();
  document.getElementById('deliverables-box').value = data.deliverables;
  document.getElementById('status-badge').className = "badge badge-done";
  document.getElementById('status-badge').innerText = "DONE";
  document.getElementById('live-dot').style.display = 'none';
  switchTab('post');
}

window.addEventListener('load', async () => {
  try {
    if (typeof zoomSdk !== 'undefined') {
      await zoomSdk.config({ capabilities: ['getMeetingContext'] });
      const context = await zoomSdk.getMeetingContext();
      
      if (context && (context.meetingId || context.meetingUUID)) {
        const matchRes = await fetch('/api/meetings/active-match', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ meetingId: context.meetingId, meetingUUID: context.meetingUUID })
        });
        const result = await matchRes.json();
        if (result.matched) {
          selectMeeting(result.event_id, result.source);
          return;
        }
        document.getElementById('matching-status').innerText = "Active Zoom context found but no matching calendar event found.";
      }
    }
  } catch (err) {
    console.error("Zoom SDK match failed:", err);
    document.getElementById('matching-status').innerText = "Failed to fetch Zoom app context natively. Falling back.";
  }
});
</script>
</body>
</html>
